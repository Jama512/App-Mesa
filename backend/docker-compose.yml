version: '3.8'

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: mesa_postgres
    environment:
      POSTGRES_USER: mesa_user
      POSTGRES_PASSWORD: mesa_password
      POSTGRES_DB: mesa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesa_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI
  backend:
    build: .
    container_name: mesa_backend
    environment:
      DATABASE_URL: "postgresql://mesa_user:mesa_password@db:5432/mesa_db"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./static:/app/static
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
